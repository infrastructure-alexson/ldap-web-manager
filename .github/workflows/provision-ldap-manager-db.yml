name: Provision LDAP Manager PostgreSQL

on:
  workflow_dispatch:
    inputs:
      check_mode:
        description: Ansible check mode (dry run)
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      check_mode:
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  provision-db:
    runs-on: [self-hosted, linux, infra]
    steps:
      - name: Load GitHub App credentials from Infisical (OIDC)
        uses: infrastructure-alexson/.github-private/actions/infisical-oidc-load@v1.5.0
        with:
          project_slug: secrets-vi-5-a
          secret_path: /GitHub
          recursive: "true"
          secret_keys: >-
            github-app-client-id,
            github-app-id,
            github-app-private-key,
            automation-github-app-client-id,
            automation-github-app-id,
            automation-github-app-private-key

      - name: Create GitHub App token for repository checkout
        id: gh-app
        env:
          FALLBACK_CLIENT_ID: ${{ secrets.AUTOMATION_GITHUB_APP_CLIENT_ID }}
          FALLBACK_APP_ID: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          FALLBACK_APP_KEY: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
        uses: infrastructure-alexson/.github-private/actions/github-app-token@v1.2.0
        with:
          client_id: ${{ env.AUTOMATION_GITHUB_APP_CLIENT_ID || env.GITHUB_APP_CLIENT_ID || env.FALLBACK_CLIENT_ID }}
          app_id: ${{ env.AUTOMATION_GITHUB_APP_ID || env.GITHUB_APP_ID || env.FALLBACK_APP_ID }}
          private_key: ${{ env.AUTOMATION_GITHUB_APP_PRIVATE_KEY || env.GITHUB_APP_PRIVATE_KEY || env.FALLBACK_APP_KEY }}
          owner: infrastructure-alexson
          repositories: ldap-web-manager

      - uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          token: ${{ steps.gh-app.outputs.token }}

      - name: Load LDAP Manager secrets from Infisical (OIDC)
        uses: infrastructure-alexson/.github-private/actions/infisical-oidc-load@v1.5.0
        with:
          secret_path: /LDAPManager
          recursive: "false"
          secret_keys: ldap-manager-database-password

      - name: Load Ansible SSH key from Infisical (OIDC)
        uses: infrastructure-alexson/.github-private/actions/infisical-oidc-load@v1.5.0
        with:
          secret_path: /Ansible
          recursive: "false"
          secret_keys: ansible-ssh-private-key

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          pip install "ansible>=9,<11" pyyaml
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Materialize vault vars
        working-directory: ansible
        env:
          LDAP_MANAGER_DATABASE_PASSWORD: ${{ env.LDAP_MANAGER_DATABASE_PASSWORD }}
          LDAP_MANAGER_REDIS_PASSWORD: placeholder
          LDAP_WEBMANAGER_PASSWORD: placeholder
          JWT_SECRET: placeholder
          APP_SECRET_KEY: placeholder
        run: |
          python3 - <<'PY'
          import os, yaml
          from pathlib import Path
          data = {"ldap_manager_database_password": os.environ["LDAP_MANAGER_DATABASE_PASSWORD"]}
          p = Path("inventory/group_vars/all/vault.yml")
          p.parent.mkdir(parents=True, exist_ok=True)
          p.write_text(yaml.dump(data), encoding="utf-8")
          p.chmod(0o600)
          PY

      - name: Write SSH private key file
        run: |
          set +x
          umask 077
          key="${ANSIBLE_SSH_PRIVATE_KEY:-}"
          [ -n "$key" ] || { echo "::error::ANSIBLE_SSH_PRIVATE_KEY missing"; exit 1; }
          key_file="${RUNNER_TEMP}/ansible-automation-key"
          printf '%s\n' "$key" > "$key_file"
          chmod 600 "$key_file"
          echo "ANSIBLE_PRIVATE_KEY_FILE=${key_file}" >> "$GITHUB_ENV"

      - name: Provision PostgreSQL
        working-directory: ansible
        run: |
          EXTRA=()
          if [ "${{ inputs.check_mode }}" = "true" ]; then EXTRA+=(--check --diff); fi
          ansible-playbook playbook-provision-db.yml \
            -i inventory/inventory.yml \
            -e ansible_user=automation \
            -e "ansible_ssh_private_key_file=${ANSIBLE_PRIVATE_KEY_FILE}" \
            "${EXTRA[@]}"
